<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LumiPanel - Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#10141a",
                        "tertiary-fixed": "#e2e2e2",
                        "surface-container-high": "#262a31",
                        "on-secondary-fixed-variant": "#424750",
                        "on-error-container": "#ffdad6",
                        "on-background": "#dfe2eb",
                        "surface-container-lowest": "#0a0e14",
                        "secondary": "#c2c6d2",
                        "tertiary-container": "#5f6161",
                        "inverse-on-surface": "#2d3137",
                        "on-primary-container": "#afe6e9",
                        "primary-fixed": "#b6ecef",
                        "on-secondary-container": "#b4b8c4",
                        "error-container": "#93000a",
                        "on-tertiary": "#2f3131",
                        "outline-variant": "#40484f",
                        "on-primary": "#003739",
                        "on-error": "#690005",
                        "surface-container": "#1c2026",
                        "on-surface-variant": "#c0c7d0",
                        "on-tertiary-container": "#dcdcdc",
                        "primary-fixed-dim": "#9ad0d3",
                        "surface-container-low": "#181c22",
                        "surface-container-highest": "#31353c",
                        "surface": "#10141a",
                        "on-secondary": "#2c3139",
                        "on-primary-fixed-variant": "#144e51",
                        "inverse-primary": "#316669",
                        "surface-dim": "#10141a",
                        "surface-variant": "#31353c",
                        "secondary-container": "#444953",
                        "primary": "#9ad0d3",
                        "secondary-fixed-dim": "#c2c6d2",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-secondary-fixed": "#171c24",
                        "surface-tint": "#9ad0d3",
                        "on-tertiary-fixed": "#1a1c1c",
                        "primary-container": "#33696c",
                        "on-surface": "#dfe2eb",
                        "on-primary-fixed": "#002021",
                        "on-tertiary-fixed-variant": "#454747",
                        "inverse-surface": "#dfe2eb",
                        "tertiary": "#c6c6c7",
                        "surface-bright": "#353940",
                        "outline": "#8a919a",
                        "error": "#ffb4ab",
                        "secondary-fixed": "#dee2ee"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "manrope": ["Manrope"],
                        "inter": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            scrollbar-width: none;
            -ms-overflow-style: none;
            background-color: #10141a;
        }
        body::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-card {
            background: rgba(49, 53, 60, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body select-none">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/history@5/umd/history.development.js"></script>
    <script src="https://unpkg.com/react-router@6.3.0/umd/react-router.development.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.3.0/umd/react-router-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;
        const { MemoryRouter, Routes, Route, Link, useNavigate, useLocation } = ReactRouterDOM;

        const Layout = ({ children, activeTab, onSearch }) => {
            const navigate = useNavigate();
            return (
                <div class="flex flex-col min-h-screen">
                    <header class="bg-[#181c22] text-[#9ad0d3] font-headline tracking-tight w-full px-4 h-14 sticky top-0 z-40 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="text-xl font-bold tracking-tighter text-[#9ad0d3] cursor-pointer" onClick={() => navigate('/')}>LumiPanel</div>
                            {activeTab === 'settings' && (
                                <React.Fragment>
                                    <span class="text-outline text-xs opacity-50">/</span>
                                    <span class="text-sm font-semibold text-on-surface-variant font-manrope tracking-tight">Settings</span>
                                </React.Fragment>
                            )}
                        </div>
                        <div class="flex gap-2">
                            <button onClick={onSearch} class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-[#353940] transition-colors scale-95 duration-200">
                                <span class="material-symbols-outlined">search</span>
                            </button>
                            <button class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-[#353940] transition-colors scale-95 duration-200">
                                <span class="material-symbols-outlined">add</span>
                            </button>
                        </div>
                    </header>

                    <main class="flex-1">
                        {children}
                    </main>

                    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-[#10141a]/95 backdrop-blur-xl shadow-[0px_-4px_16px_rgba(0,0,0,0.3)] rounded-t-xl border-t border-[#40484f]/15">
                        <Link to="/" class={`flex flex-col items-center justify-center rounded-xl px-8 py-1 transition-all active:scale-90 duration-150 ${activeTab === 'links' ? 'bg-[#33696c] text-[#9ad0d3]' : 'text-[#c0c7d0] hover:text-white'}`}>
                            <span class="material-symbols-outlined" style={{ fontVariationSettings: activeTab === 'links' ? "'FILL' 1" : "'FILL' 0" }}>list_alt</span>
                            <span class="font-inter text-[11px] font-medium tracking-wide">Links</span>
                        </Link>
                        <Link to="/settings" class={`flex flex-col items-center justify-center rounded-xl px-8 py-1 transition-all active:scale-90 duration-150 ${activeTab === 'settings' ? 'bg-[#33696c] text-[#9ad0d3]' : 'text-[#c0c7d0] hover:text-white'}`}>
                            <span class="material-symbols-outlined" style={{ fontVariationSettings: activeTab === 'settings' ? "'FILL' 1" : "'FILL' 0" }}>settings</span>
                            <span class="font-inter text-[11px] font-medium tracking-wide">Settings</span>
                        </Link>
                    </nav>
                </div>
            );
        };

        const LinkCard = ({ title, time, url, icon, tag, tagColor }) => (
            <div class="group bg-surface-container-high hover:bg-surface-container-highest rounded-full p-3 pl-4 flex items-center justify-between transition-all duration-300">
                <div class="flex items-center gap-3 overflow-hidden">
                    <div class="w-10 h-10 rounded-xl bg-surface-container-highest flex items-center justify-center flex-shrink-0">
                        <img alt={title} class="w-6 h-6" src={icon}/>
                    </div>
                    <div class="overflow-hidden">
                        <h3 class="font-headline font-bold text-on-surface text-sm truncate">{title}</h3>
                        <div class="flex items-center gap-2 text-[10px] text-on-surface-variant">
                            <span>{time}</span>
                            <span class="w-1 h-1 rounded-full bg-outline-variant"></span>
                            {tag ? (
                                <span class={`px-1.5 py-0.5 rounded ${tagColor} font-bold`}>{tag}</span>
                            ) : (
                                <span class="truncate">{url}</span>
                            )}
                        </div>
                    </div>
                </div>
                <div class="flex gap-1 pr-1">
                    <button class="w-8 h-8 rounded-full flex items-center justify-center text-on-surface-variant hover:text-primary hover:bg-surface-bright transition-all">
                        <span class="material-symbols-outlined text-lg">open_in_new</span>
                    </button>
                    <button class="w-8 h-8 rounded-full flex items-center justify-center text-on-surface-variant hover:text-error hover:bg-surface-bright transition-all">
                        <span class="material-symbols-outlined text-lg">delete</span>
                    </button>
                </div>
            </div>
        );

        const LinksPage = () => {
            const [filter, setFilter] = useState('All');
            const chips = ['All', 'Ungrouped', 'Projects', 'Research'];

            const links = [
                { title: 'Modern UI Inspiration', time: '47m ago', url: 'dribbble.com/shots/...', icon: 'https://lh3.googleusercontent.com/aida-public/AB6AXuDqBCYdhmkENcRoWlGTc3jsudPoPxhP6zHwKX7E3pjxZ86br-VZ3O_x3TTaBSIQ1lcKpTqfiEneszq-wHs10uoHddMNahm4VFRIiCdNI-zhV5ZAlRIOWW-coTw4cXBWEQWNzw7MLfJE7BZScZxFZR8bzuR2UZSaTQc3pU-R_9eMMi5P08aaQmZKxFBnWz0qBc3Dl0W5ptuGjQJLjxsM0IHHIoD9bhHY6A7jFWEAG6ICoVNppk5Hr5Izvl2BrSDtTU0CMmboGcJgXxM' },
                { title: 'LumiPanel Dev Repo', time: '2h ago', url: 'github.com/lumipanel', icon: 'https://lh3.googleusercontent.com/aida-public/AB6AXuAa6BMC3VoxihQ_s6PvwJhzLcjAPjxBU9IxpVewdjnnaQXzSPAVyMMCvfaEDNrSpaTkM-u3D6ppGSERefxUvRVuRljppIEbqKGZrUdLOtPjL05epPg6o89biUitMHxqcfh4vO-DmCKl1P53QPmziKapg3xemzVgYBEqWghl66SGiVOfIfRmo9oxu7SM_OR9vHv5kdtH_7X0XPvJHUXFRuZ7QyX6dMFN2sKvQq1DQjmxpv45taNU9C9Z9Wfdcp2Il0QNn0gbVih2Lek', tag: 'Projects', tagColor: 'bg-primary/10 text-primary' },
                { title: 'Prism Dispersion Theory', time: 'Yesterday', url: 'wikipedia.org/wiki/...', icon: 'https://lh3.googleusercontent.com/aida-public/AB6AXuA7TAw21Ezy0v-vVowDTM6I7vmej8ikN6R8kfXnSBqA-oAlpEVmp_7hYgGY-fcguvP2zuYgBK2i7DJh9gKx-drBR6vwTwvfwiyF0hkalvFLZaM0qWCgw1AI7qeaaZqcmMaWmWY_LHTcHCu4zcxtFrgo2R1hfQSBcajvz-67dGQZ7LDXoEbAuVmYgAtYQDiH9W6YNpJo746aR3hdAYYINJ9sHjixIHl65P9WRcJRa60IWedn5qOFZquD964ov3jZJBtyBXwIyWd2HWQ', tag: 'Research', tagColor: 'bg-tertiary-container/30 text-tertiary' },
                { title: 'Design System Tokens', time: '3d ago', url: 'figma.com/file/...', icon: 'https://lh3.googleusercontent.com/aida-public/AB6AXuCwmK4tOaGlnQ-d7wSrcGswLKaE_Ao-t-97dnkPcRQmC206lAQJuuWYxbRmhx94hkHzAzMJ_MqSZLuowFmal2o0R3XFPOQ8QLuZaW92G7iBKKUT1a7Xutq1iBIQMv6hKY9S3aHCsMnEm4p4Y7Wv_8kE0sPOcJ9Il5OcHNpnU-ZM2fyRJluuLcsU7l76Uz2yqowoV5sqM7tVfK1X8XVksmkjHGTyr5Dpci-PWsDcEzM9s6gb4qbbtBjzbDC_uZ4EyRYmcZvtrAUk6Dw' }
            ];

            return (
                <Layout activeTab="links">
                    <div class="px-4 pb-24 pt-4">
                        <div class="grid grid-cols-2 gap-3 mb-8">
                            <button class="flex flex-col items-start justify-end p-4 h-28 rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary shadow-[0px_12px_32px_rgba(0,0,0,0.4)] transition-all hover:brightness-110 active:scale-95">
                                <span class="material-symbols-outlined mb-2">bookmark</span>
                                <span class="font-headline font-bold text-sm tracking-tight">Save Current</span>
                            </button>
                            <button class="flex flex-col items-start justify-end p-4 h-28 rounded-full bg-surface-container-high text-primary transition-all hover:bg-surface-container-highest active:scale-95">
                                <span class="material-symbols-outlined mb-2">library_add</span>
                                <span class="font-headline font-bold text-sm tracking-tight">Save All</span>
                            </button>
                        </div>

                        <div class="mb-8">
                            <div class="relative group">
                                <input class="w-full bg-surface-container-lowest border-none rounded-full py-4 pl-5 pr-14 text-sm focus:ring-2 focus:ring-primary/40 placeholder:text-on-surface-variant/50 transition-all" placeholder="Paste URL here..." type="text"/>
                                <button class="absolute right-2 top-2 bottom-2 px-4 bg-primary text-on-primary rounded-full font-bold text-xs hover:bg-primary-fixed-dim transition-colors">
                                    Add
                                </button>
                            </div>
                        </div>

                        <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-4">
                            {chips.map(chip => (
                                <button 
                                    key={chip}
                                    onClick={() => setFilter(chip)}
                                    class={`px-5 py-2 rounded-full text-xs font-semibold whitespace-nowrap transition-colors ${filter === chip ? 'bg-primary-container text-on-primary-container' : 'bg-secondary-container text-on-surface-variant hover:text-white'}`}
                                >
                                    {chip}
                                </button>
                            ))}
                        </div>

                        <div class="space-y-3">
                            {links.map((link, idx) => (
                                <LinkCard key={idx} {...link} />
                            ))}
                        </div>
                    </div>
                </Layout>
            );
        };

        const SettingsPage = () => {
            const [selectedTheme, setSelectedTheme] = useState('Match System');
            const [selectedFont, setSelectedFont] = useState('Manrope');

            const themes = [
                { id: 'Match System', label: 'Match System', icon: 'brightness_auto', bg: 'bg-gradient-to-br from-surface-container-low to-surface-container-highest', iconColor: 'text-primary' },
                { id: 'Light', label: 'Light', icon: 'light_mode', bg: 'bg-[#f0f2f5]', iconColor: 'text-[#10141a]' },
                { id: 'Dark', label: 'Dark', icon: 'dark_mode', bg: 'bg-surface-container-lowest border border-outline-variant/20', iconColor: 'text-on-surface' },
                { id: 'Ocean', label: 'Ocean', icon: 'water', bg: 'bg-gradient-to-br from-[#003739] to-[#33696c]', iconColor: 'text-[#9ad0d3]' }
            ];

            const fonts = ['Manrope', 'Source Sans 3', 'Work Sans'];

            return (
                <Layout activeTab="settings">
                    <main class="flex-1 pb-32 pt-8 overflow-y-auto hide-scrollbar">
                        <div class="max-w-4xl mx-auto px-4 md:px-8 space-y-10">
                            {/* Theme Selection */}
                            <section>
                                <h2 class="font-headline text-lg font-bold tracking-tight mb-4 text-primary">Theme Selection</h2>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    {themes.map(theme => (
                                        <button 
                                            key={theme.id}
                                            onClick={() => setSelectedTheme(theme.id)}
                                            class={`group relative flex flex-col gap-3 p-4 bg-surface-container-high rounded-full hover:bg-surface-container-highest transition-all duration-300 ${selectedTheme === theme.id ? 'ring-2 ring-primary' : ''}`}
                                        >
                                            <div class={`h-16 w-full rounded-xl flex items-center justify-center overflow-hidden ${theme.bg}`}>
                                                <span class={`material-symbols-outlined ${theme.iconColor} text-3xl`}>{theme.icon}</span>
                                            </div>
                                            <span class={`font-label text-xs font-medium text-center ${selectedTheme === theme.id ? 'text-on-surface' : 'text-on-surface-variant group-hover:text-on-surface'}`}>{theme.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </section>

                            <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                                {/* Font Selection */}
                                <section class="md:col-span-7 bg-surface-container rounded-full p-6">
                                    <h2 class="font-headline text-lg font-bold tracking-tight mb-6 text-primary">Font Selection</h2>
                                    <div class="space-y-3">
                                        {fonts.map(font => (
                                            <label key={font} class="flex items-center justify-between p-4 bg-surface-container-high rounded-xl cursor-pointer hover:bg-surface-container-highest transition-colors">
                                                <span class={`font-headline text-on-surface ${font === 'Source Sans 3' || font === 'Work Sans' ? 'font-body' : ''}`}>{font}</span>
                                                <input 
                                                    checked={selectedFont === font}
                                                    onChange={() => setSelectedFont(font)}
                                                    class="form-radio h-5 w-5 text-primary bg-surface-container-lowest border-none focus:ring-primary/40 rounded-full" 
                                                    name="font" 
                                                    type="radio"
                                                />
                                            </label>
                                        ))}
                                    </div>
                                </section>

                                {/* Shortcut Editor */}
                                <section class="md:col-span-5 bg-surface-container rounded-full p-6 flex flex-col">
                                    <h2 class="font-headline text-lg font-bold tracking-tight mb-6 text-primary">Shortcuts</h2>
                                    <div class="space-y-4 flex-1">
                                        <div class="space-y-2">
                                            <label class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold px-1">Toggle Panel</label>
                                            <div class="relative group">
                                                <input class="w-full bg-surface-container-lowest border-none rounded-xl py-3 px-4 text-sm font-mono text-primary focus:ring-2 focus:ring-primary/40 transition-all" type="text" defaultValue="Alt+Shift+L"/>
                                                <span class="absolute right-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-lg">keyboard</span>
                                            </div>
                                        </div>
                                        <div class="space-y-2">
                                            <label class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold px-1">Save Current Page</label>
                                            <div class="relative group">
                                                <input class="w-full bg-surface-container-lowest border-none rounded-xl py-3 px-4 text-sm font-mono text-primary focus:ring-2 focus:ring-primary/40 transition-all" type="text" defaultValue="Alt+Shift+S"/>
                                                <span class="absolute right-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-lg">bookmark</span>
                                            </div>
                                        </div>
                                    </div>
                                    <p class="mt-4 text-[10px] text-on-surface-variant leading-relaxed">Click in the field and press your desired key combination to update.</p>
                                </section>
                            </div>

                            {/* Group Management */}
                            <section class="bg-surface-container rounded-full p-6">
                                <div class="flex justify-between items-center mb-6">
                                    <h2 class="font-headline text-lg font-bold tracking-tight text-primary">Group Management</h2>
                                    <button class="bg-primary-container text-on-primary-container px-4 py-2 rounded-xl text-xs font-bold hover:brightness-110 transition-all flex items-center gap-2">
                                        <span class="material-symbols-outlined text-sm">add_circle</span>
                                        New Group
                                    </button>
                                </div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    {[
                                        { name: 'Design Inspiration', color: 'bg-[#9ad0d3]' },
                                        { name: 'Reading List', color: 'bg-[#444953]' },
                                        { name: 'Dev Documentation', color: 'bg-primary-fixed' }
                                    ].map((group, i) => (
                                        <div key={i} class="flex items-center justify-between p-4 bg-surface-container-high rounded-xl group hover:bg-surface-container-highest transition-colors">
                                            <div class="flex items-center gap-3">
                                                <span class={`w-2 h-2 rounded-full ${group.color}`}></span>
                                                <span class="text-sm font-medium">{group.name}</span>
                                            </div>
                                            <button class="opacity-0 group-hover:opacity-100 transition-opacity text-error hover:scale-110">
                                                <span class="material-symbols-outlined text-xl">delete</span>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                                {/* Data Transfer */}
                                <section class="bg-surface-container rounded-full p-6">
                                    <h2 class="font-headline text-lg font-bold tracking-tight mb-6 text-primary">Data Transfer</h2>
                                    <div class="space-y-6">
                                        <div class="flex p-1 bg-surface-container-lowest rounded-xl">
                                            <button class="flex-1 py-2 text-[10px] font-bold tracking-tighter uppercase transition-all rounded-lg bg-surface-container-highest text-on-surface ring-1 ring-inset ring-white/5">CSV FORMAT</button>
                                            <button class="flex-1 py-2 text-[10px] font-bold tracking-tighter uppercase transition-all rounded-lg text-on-surface-variant hover:text-on-surface">JSON FORMAT</button>
                                        </div>
                                        <div class="grid grid-cols-2 gap-3">
                                            <button class="flex flex-col items-center justify-center gap-2 p-4 bg-surface-container-low rounded-xl hover:bg-surface-container-highest transition-all group">
                                                <span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">upload</span>
                                                <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-tighter">Import Data</span>
                                            </button>
                                            <button class="flex flex-col items-center justify-center gap-2 p-4 bg-surface-container-low rounded-xl hover:bg-surface-container-highest transition-all group">
                                                <span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">download</span>
                                                <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-tighter">Export Data</span>
                                            </button>
                                        </div>
                                    </div>
                                </section>
                                {/* Danger Zone */}
                                <section class="bg-surface-container-lowest border border-error/20 rounded-full p-6">
                                    <h2 class="font-headline text-lg font-bold tracking-tight mb-2 text-error">Danger Zone</h2>
                                    <p class="text-xs text-on-surface-variant mb-6 leading-relaxed">Irreversible actions. Please proceed with caution. All cloud-synced data will be purged.</p>
                                    <button class="w-full py-4 bg-error-container text-on-error-container rounded-xl font-bold text-sm hover:brightness-125 transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                                        <span class="material-symbols-outlined">delete_forever</span>
                                        Clear All Links
                                    </button>
                                </section>
                            </div>
                        </div>
                    </main>
                </Layout>
            );
        };

        const App = () => {
            return (
                <MemoryRouter>
                    <Routes>
                        <Route path="/" element={<LinksPage />} />
                        <Route path="/settings" element={<SettingsPage />} />
                    </Routes>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
